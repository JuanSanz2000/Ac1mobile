name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract project ZIP (si existe)
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -1)
          if [ -n "$ZIP" ]; then
            echo "Extrayendo $ZIP..."
            unzip -o "$ZIP" -d extracted/
            INNER=$(ls extracted/ | head -1)
            if [ -d "extracted/$INNER" ]; then
              cp -r extracted/$INNER/. .
            fi
          else
            echo "No se encontró ZIP, el proyecto ya está extraído."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Show gradle.properties (diagnóstico)
        run: |
          echo "=== gradle.properties ==="
          cat gradle.properties 2>/dev/null || echo "(no existe gradle.properties)"
          echo ""
          echo "=== gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "(no existe)"

      - name: Fix gradle jvmargs if broken
        run: |
          if [ -f gradle.properties ]; then
            python3 - <<'EOF'
          import re
          with open("gradle.properties", "r") as f:
              content = f.read()
          fixed = re.sub(r'\\\n\s*', ' ', content)
          fixed = fixed.lstrip('\ufeff')
          with open("gradle.properties", "w") as f:
              f.write(fixed)
          print("gradle.properties procesado.")
          EOF
            echo "=== gradle.properties tras corrección ==="
            cat gradle.properties
          fi

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AssassinsCreed-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
